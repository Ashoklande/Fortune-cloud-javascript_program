<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>query</title>
</head>
<body>
    <h2>welcome</h2>
    <h2>Hello Ashoka</h2>


    <script>
        document.querySelectorAll("h2").forEach((q)=>{
            q.style.color = "Yellow";
        })
    </script>
</body>
</html>
