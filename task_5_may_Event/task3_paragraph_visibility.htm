<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <p>
            Lorem, ipsum dolor sit amet consectetur adipisicing elit. Harum, modi. Recusandae harum labore cumque totam, sed rem, quia adipisci consequatur voluptatum reiciendis omnis!
        </p>
        <button>hide</button>
        <script>
                const para = document.querySelector("p");
                document.querySelector("button").addEventListener("click" , () =>{
                    if (para.style.visibility === "hidden") {
                     document.querySelector("button").innerText = "hide"
                     para.style.visibility = "visible";
                    } else {
                        para.style.visibility = "hidden";
                       document.querySelector("button").innerText = "show";
                    }

                 })
        </script>
</body>
</html>
