    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>

        <button style="display: block; margin-top: 20px;">Red</button>
        <button style="display: block; margin-top: 20px;">Green</button>
        <button style="display: block; margin-top: 20px;">Blue</button>
            <script>
                    document.querySelectorAll("button").forEach((butn)=>{
                        butn.addEventListener("click" ,()=>{
                            document.body.style.backgroundColor = butn.innerText;
                        })
                    })
            </script>
    </body>
    </html>
